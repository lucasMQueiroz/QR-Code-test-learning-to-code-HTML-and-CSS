<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | QR code component</title>

  <style>
    * {
      box-sizing: border-box;
    }
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    .container {
      display: flex;
      flex-flow: column wrap;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }
    @media (min-width: 768px) {
      .container {
        flex-flow: row wrap;
        padding: 2rem;
      }
    }
    body {
      background-color: hsl(212, 45%, 89%);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-flow: column;
      justify-content: center;
      align-items: center;
    }
    #box {
      display: flex;
      flex-direction: column;
      margin-bottom: auto;
      gap: 20px;
      padding: 1rem;
      width: 320px;
      height: 499px;
      background-color: hsl(0, 0%, 100%);
      border-radius: 20px;
      border-top: 16px;
      border-left: 16px;
      border-right: 16px;
      border-bottom: 40px;
    }
      
    img {
      max-width: 100%; height: auto;
      border-radius: 10px;
    }
    #texts {
      display: flex;
      flex-direction: column;
      gap: 16px;
      border-right: 16px solid transparent;
      border-left: 16px solid transparent;
    }
    div {
      font-family: 'Outfit';
      text-align: center;
      width: 100%;
      height: auto;
    }
    div:first-of-type {
      font-weight: 700;
      color: hsl(218, 44%, 22%);
      font-size: 22px;
    }
    div:nth-of-type(2) {
      font-size: 15px;
      font-weight: 400;
      color: hsl(216, 15%, 48%);
      ;
    }
  </style>
</head>
<body>
  <main class="container">
    <section aria-label="card" id="box">
      <img src="images/image-qr-code.png"> 
      <section aria-label="texts" id="texts">
        <div>Improve your front-end skills by building projects</div>
        <div> Scan the QR code to visit Frontend Mentor and take your coding skills to another level</div>
      </section>
    </section>
  </main>

  
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">lucasMQueiroz</a>.
  </footer>
</body>
</html>
